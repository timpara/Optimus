name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy

      - name: pytest (with coverage)
        run: pytest --cov --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874  # v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    # Catch regressions like a missing `COPY optimus` in the builder stage
    # or a .dockerignore that silently excludes a build input — things the
    # lint + test job can't see because they never touch the Dockerfile.
    # We deliberately do NOT push; this is a build-only smoke test.
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Build image (no push)
        # ubuntu-latest ships with Docker & buildx preinstalled.  A plain
        # `docker build` here would have caught the broken build on main,
        # which silently slipped through because docker-release.yml only
        # runs on tag.
        run: docker build -t optimus:ci .

      - name: Smoke-test the built image
        # If the `optimus` package isn't present in the venv, or if any of
        # the stdlib imports break, this fails before we ever ship a broken
        # image to GHCR.
        run: |
          docker run --rm \
            -e OPTIMUS_CLASS_PASSWORD=ci-test \
            -e OPTIMUS_ADMIN_KEY=ci-test \
            optimus:ci \
            python -c "import main; import optimus.config; import optimus.constants; print('imports ok')"
