name: Bug report
description: Report a defect in Optimus
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the fields
        below so we can reproduce and diagnose the problem quickly.
  - type: input
    id: version
    attributes:
      label: Optimus version
      description: Output of `git describe --tags` or the Docker image tag you ran.
      placeholder: "v0.1.1 or ghcr.io/timpara/optimus:latest"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: How are you running Optimus?
      options:
        - Docker / docker compose
        - Local Python (uvicorn)
        - Other (please describe below)
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the server with `…`
        2. Log in as `…`
        3. Click `…`
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste server logs, browser console output, or screenshots.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
