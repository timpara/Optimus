# ─────────────────────────────────────────────────────────────────────────────
# Optimus — Battery Trader Sim
# docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  optimus:
    build: .
    container_name: optimus
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database across container restarts.
      # To wipe and start fresh:  docker compose down -v
      - optimus-data:/data

    # ── Environment variables (uncomment and change as needed) ──
    # All values below show their defaults. The game runs fine without
    # setting any of these — only override what you want to change.
    #
    # environment:
    #   OPTIMUS_CLASS_PASSWORD: "trade2026"
    #   OPTIMUS_ADMIN_KEY: "optimus_admin_2026"
    #   OPTIMUS_TICK_INTERVAL: "1.0"
    #   OPTIMUS_BATTERY_MAX_MWH: "50000"
    #   OPTIMUS_BATTERY_MAX_MW: "10000"
    #   OPTIMUS_BATTERY_START_MWH: "25000"
    #   OPTIMUS_STARTING_CASH: "0.0"
    #   OPTIMUS_STARTING_REF_PRICE: "45.0"

    # Alternatively, load all env vars from a file:
    # env_file:
    #   - .env

volumes:
  optimus-data:
