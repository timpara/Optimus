# ─────────────────────────────────────────────────────────────────────────────
# Optimus — Battery Trader Sim
# docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  optimus:
    build:
      context: .
      args:
        VERSION: ${OPTIMUS_VERSION:-dev}
    # Or pull the public image instead of building locally:
    # image: ghcr.io/timpara/optimus:latest
    container_name: optimus
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database across container restarts.
      # To wipe and start fresh:  docker compose down -v
      - optimus-data:/data

    # ── Required secrets ──
    # The server refuses to start without these. Set them in a `.env` file
    # (copy from `.env.example`) or inline below.
    env_file:
      - .env

    # Lightweight healthcheck via /health (overrides any in the image).
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  optimus-data:
